name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run multimodal demo
        run: python examples/run_multimodal_demo.py

      - name: Run conditional flow demo
        run: python examples/run_conditional_flow_demo.py
